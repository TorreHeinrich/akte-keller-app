1. Source: Production Stats -> Goal: Inform -> Viz: Stat Cards -> Interaction: Hover effects -> Justification: Immediate visual hierarchy.

                    </div>
                </div>
            `,
            team: `

                    <header class="mb-12">

                if (currentQuestionIndex >= currentLevelData.questions.length) {
